<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆表单 - 生猪运输管理系统</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .form-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            padding: 25px;
            max-width: 800px;
            margin: 0 auto;
        }
        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .form-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-title i {
            color: #FF9800;
        }
        .form-section {
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #555;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 4px solid #FF9800;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-weight: 500;
        }
        .required::after {
            content: " *";
            color: #ff4d4f;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
<div class="form-container">
    <!-- 表单头部 -->
    <div class="form-header">
        <div class="form-title">
            <i class="fas fa-truck"></i>
            <span id="formTitle">添加车辆</span>
        </div>
        <div class="form-status">
            <span id="formStatus" class="layui-badge layui-bg-blue">草稿</span>
        </div>
    </div>

    <!-- 基本信息 -->
    <div class="form-section">
        <div class="section-title">
            <i class="fas fa-info-circle"></i> 基本信息
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label required">车牌号</label>
                <input type="text" id="licensePlate" class="layui-input"
                       placeholder="请输入车牌号" lay-verify="required">
                <div class="layui-form-mid layui-word-aux">格式如：粤A12345</div>
            </div>
            <div class="form-group">
                <label class="form-label required">车型</label>
                <input type="text" id="model" class="layui-input"
                       placeholder="请输入车型" lay-verify="required">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label required">车辆类型</label>
                <select id="vehicleType" class="layui-select" lay-verify="required">
                    <option value="">请选择类型</option>
                    <option value="truck">厢式货车</option>
                    <option value="van">面包车</option>
                    <option value="refrigerated">冷藏车</option>
                    <option value="other">其他</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">载重能力(吨)</label>
                <input type="number" id="capacity" class="layui-input"
                       placeholder="请输入载重量" step="0.1">
            </div>
        </div>
    </div>

    <!-- 状态信息 -->
    <div class="form-section">
        <div class="section-title">
            <i class="fas fa-cog"></i> 状态设置
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label required">车辆状态</label>
                <select id="status" class="layui-select" lay-verify="required">
                    <option value="free">空闲</option>
                    <option value="transporting">运输中</option>
                    <option value="maintenance">维修中</option>
                    <option value="resting">休息中</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">当前司机</label>
                <input type="text" id="driverName" class="layui-input"
                       placeholder="未分配" readonly>
            </div>
        </div>
    </div>

    <!-- 其他信息 -->
    <div class="form-section">
        <div class="section-title">
            <i class="fas fa-file-alt"></i> 其他信息
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">购买日期</label>
                <input type="text" id="purchaseDate" class="layui-input"
                       placeholder="请选择日期" id="purchaseDate">
            </div>
            <div class="form-group">
                <label class="form-label">行驶里程(km)</label>
                <input type="number" id="mileage" class="layui-input"
                       placeholder="请输入里程数">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">备注信息</label>
            <textarea id="remark" class="layui-textarea"
                      placeholder="请输入备注信息" rows="3"></textarea>
        </div>
    </div>

    <!-- 表单操作 -->
    <div class="form-actions">
        <button type="button" class="layui-btn layui-btn-primary" onclick="cancelForm()">
            <i class="fas fa-times"></i> 取消
        </button>
        <button type="button" class="layui-btn layui-btn-normal" onclick="saveForm()">
            <i class="fas fa-save"></i> 保存信息
        </button>
    </div>
</div>

<script src="/layui/layui.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    layui.use(['form', 'laydate'], function(){
        var form = layui.form;
        var laydate = layui.laydate;

        // 初始化日期选择器
        laydate.render({
            elem: '#purchaseDate',
            theme: '#FF9800'
        });

        // 从URL获取ID参数，判断是新增还是编辑
        var urlParams = new URLSearchParams(window.location.search);
        var vehicleId = urlParams.get('id');

        if(vehicleId) {
            // 编辑模式
            document.getElementById('formTitle').textContent = '编辑车辆';
            document.getElementById('formStatus').textContent = '编辑中';
            document.getElementById('formStatus').className = 'layui-badge layui-bg-orange';

            // 加载车辆信息
            loadVehicleData(vehicleId);
        }

        // 渲染表单
        form.render();
    });

    // 加载车辆数据
    function loadVehicleData(vehicleId) {
        $.ajax({
            url: '/api/vehicle/detail/' + vehicleId,
            type: 'GET',
            success: function(res) {
                if(res.code === 200) {
                    var data = res.data;
                    $('#licensePlate').val(data.licensePlate || '');
                    $('#model').val(data.model || '');
                    $('#vehicleType').val(data.vehicleType || '');
                    $('#capacity').val(data.capacity || '');
                    $('#status').val(data.status || 'free');
                    $('#driverName').val(data.driverName || '未分配');
                    $('#purchaseDate').val(data.purchaseDate || '');
                    $('#mileage').val(data.mileage || '');
                    $('#remark').val(data.remark || '');

                    // 重新渲染表单
                    layui.form.render();
                }
            }
        });
    }

    // 保存表单
    function saveForm() {
        var urlParams = new URLSearchParams(window.location.search);
        var vehicleId = urlParams.get('id');

        var formData = {
            licensePlate: $('#licensePlate').val(),
            model: $('#model').val(),
            vehicleType: $('#vehicleType').val(),
            capacity: $('#capacity').val() || 0,
            status: $('#status').val(),
            purchaseDate: $('#purchaseDate').val(),
            mileage: $('#mileage').val() || 0,
            remark: $('#remark').val()
        };

        // 如果有ID，是编辑模式
        if(vehicleId) {
            formData.vehicleId = vehicleId;
        }

        // 表单验证
        if(!formData.licensePlate) {
            layer.msg('请输入车牌号', {icon: 2});
            return;
        }
        if(!formData.model) {
            layer.msg('请输入车型', {icon: 2});
            return;
        }
        if(!formData.vehicleType) {
            layer.msg('请选择车辆类型', {icon: 2});
            return;
        }

        var url = vehicleId ? '/api/vehicle/update' : '/api/vehicle/add';

        $.ajax({
            url: url,
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify(formData),
            success: function(res) {
                if(res.code === 200) {
                    layer.msg('保存成功', {icon: 1});
                    // 通知父页面刷新
                    if(parent.refreshTable) {
                        parent.refreshTable();
                    }
                    // 关闭弹窗
                    var index = parent.layer.getFrameIndex(window.name);
                    parent.layer.close(index);
                } else {
                    layer.msg(res.msg || '保存失败', {icon: 2});
                }
            },
            error: function(xhr) {
                layer.msg('请求失败: ' + xhr.status, {icon: 2});
            }
        });
    }

    // 取消表单
    function cancelForm() {
        var index = parent.layer.getFrameIndex(window.name);
        parent.layer.close(index);
    }

    // 定义父页面调用的函数（用于iframe调用）
    window.submitForm = saveForm;
</script>
</body>
</html>
