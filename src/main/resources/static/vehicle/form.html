<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆表单</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <style>
        .form-container {
            padding: 20px;
        }

        .form-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }

        .form-title {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .required::after {
            content: " *";
            color: #ff5722;
        }

        .form-actions {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-card">
        <h2 class="form-title" id="formTitle">添加车辆</h2>

        <form class="layui-form" id="vehicleForm" lay-filter="vehicleForm">
            <input type="hidden" id="vehicleId" name="vehicleId">

            <div class="form-group">
                <label class="form-label required">车牌号</label>
                <input type="text" name="licensePlate" required lay-verify="required"
                       placeholder="请输入车牌号，如：京A12345" autocomplete="off" class="layui-input">
            </div>

            <div class="form-group">
                <label class="form-label">车型</label>
                <input type="text" name="model"
                       placeholder="请输入车型，如：重型货车、冷藏车" autocomplete="off" class="layui-input">
            </div>

            <div class="form-group">
                <label class="form-label">当前司机</label>
                <select name="driverId" id="driverSelect" class="layui-select">
                    <option value="">请选择司机（可不选）</option>
                    <!-- 动态加载司机列表 -->
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">车辆状态</label>
                <select name="status" class="layui-select">
                    <option value="free">空闲</option>
                    <option value="transporting">运输中</option>
                    <option value="maintenance">维修中</option>
                </select>
            </div>

            <div class="form-actions">
                <button class="layui-btn" lay-submit lay-filter="submitBtn">保存</button>
                <button type="reset" class="layui-btn layui-btn-primary">重置</button>
            </div>
        </form>
    </div>
</div>

<script src="/layui/layui.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    layui.use(['form', 'layer'], function(){
        var form = layui.form;
        var layer = layui.layer;

        // 获取URL参数
        function getQueryParam(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
            var r = window.location.search.substr(1).match(reg);
            if (r != null) return decodeURI(r[2]);
            return null;
        }

        // 加载司机列表
        function loadDrivers() {
            $.get('/api/user/drivers', function(res){
                if(res.code === 200 && res.data) {
                    var select = $('#driverSelect');
                    select.empty();
                    select.append('<option value="">请选择司机（可不选）</option>');

                    res.data.forEach(function(driver){
                        select.append('<option value="' + driver.id + '">' +
                            driver.name + ' (' + (driver.phone || '') + ')</option>');
                    });

                    form.render('select');
                }
            });
        }

        // 加载车辆数据（编辑时）
        var vehicleId = getQueryParam('id');
        if(vehicleId) {
            $('#formTitle').text('编辑车辆信息');

            $.ajax({
                url: '/api/vehicle/' + vehicleId,
                type: 'GET',
                success: function(res) {
                    if(res.code === 200 && res.data) {
                        form.val('vehicleForm', res.data);
                    }
                }
            });
        }

        // 初始化司机列表
        loadDrivers();

        // 表单提交
        form.on('submit(submitBtn)', function(data){
            var url = vehicleId ? '/api/vehicle/update' : '/api/vehicle/add';
            var method = vehicleId ? 'PUT' : 'POST';

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(data.field),
                success: function(res) {
                    if(res.code === 200) {
                        layer.msg('保存成功', {icon: 1});

                        // 延迟关闭窗口并刷新父页面
                        setTimeout(function(){
                            if(window.parent && window.parent.refreshTable) {
                                window.parent.refreshTable();
                            }
                            var index = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(index);
                        }, 1500);
                    } else {
                        layer.msg(res.message || '保存失败', {icon: 2});
                    }
                },
                error: function() {
                    layer.msg('网络错误', {icon: 2});
                }
            });

            return false;
        });

        // 提供给父窗口调用的提交方法
        window.submitForm = function() {
            $('#vehicleForm').find('button[lay-filter="submitBtn"]').click();
        };
    });
</script>
</body>
</html>
