<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 生猪运输管理系统</title>
    <link rel="stylesheet" href="/layui/css/layui.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 20px;
        }
        .page-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            padding: 25px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .page-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-title i {
            color: #7B68EE;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-item label {
            color: #666;
            font-size: 14px;
        }
        .layui-table {
            border-radius: 8px;
            overflow: hidden;
        }
        .layui-table th {
            background: #f8f9fa;
            font-weight: 500;
        }
        .layui-btn-sm {
            border-radius: 6px;
        }
        .status-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .status-enabled {
            background: #f0f9eb;
            color: #52c41a;
        }
        .status-disabled {
            background: #fef2f2;
            color: #ff4d4f;
        }
    </style>
</head>
<body>
<div class="page-container">
    <!-- 页面头部 -->
    <div class="page-header">
        <div class="page-title">
            <i class="fas fa-users"></i>
            用户管理
        </div>
        <div class="btn-group">
            <button class="layui-btn layui-btn-sm layui-btn-normal" id="addUserBtn">
                <i class="fas fa-plus"></i> 新增用户
            </button>
            <button class="layui-btn layui-btn-sm layui-btn-warm" id="exportUserBtn">
                <i class="fas fa-file-excel"></i> 导出数据
            </button>
        </div>
    </div>

    <!-- 搜索栏 -->
    <div class="search-bar">
        <div class="search-item">
            <label for="username">用户名：</label>
            <input type="text" id="username" class="layui-input" placeholder="请输入用户名" style="width: 180px;">
        </div>
        <div class="search-item">
            <label for="role">用户角色：</label>
            <select id="role" class="layui-select" style="width: 150px;">
                <option value="">全部角色</option>
                <option value="admin">管理员</option>
                <option value="operator">操作员</option>
                <option value="driver">司机</option>
            </select>
        </div>
        <div class="search-item">
            <label for="userStatus">账号状态：</label>
            <select id="userStatus" class="layui-select" style="width: 120px;">
                <option value="">全部状态</option>
                <option value="1">启用</option>
                <option value="0">禁用</option>
            </select>
        </div>
        <div class="search-item">
            <button class="layui-btn layui-btn-sm" id="searchBtn">
                <i class="fas fa-search"></i> 搜索
            </button>
            <button class="layui-btn layui-btn-sm layui-btn-primary" id="resetBtn">
                <i class="fas fa-redo"></i> 重置
            </button>
        </div>
    </div>

    <!-- 表格区域 -->
    <table class="layui-table" id="userTable" lay-filter="userTable"></table>
</div>

<!-- 新增/编辑弹窗 -->
<div id="userForm" style="display: none; padding: 20px;">
    <input type="hidden" id="userId">
    <div class="layui-form-item">
        <label class="layui-form-label">用户名</label>
        <div class="layui-input-block">
            <input type="text" id="formUsername" lay-verify="required" placeholder="请输入用户名" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">密码</label>
        <div class="layui-input-block">
            <input type="password" id="formPassword" lay-verify="required" placeholder="新增必填，编辑留空则不修改" class="layui-input">
            <div class="layui-form-mid layui-word-aux">编辑时留空表示不修改密码</div>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">真实姓名</label>
        <div class="layui-input-block">
            <input type="text" id="formRealName" lay-verify="required" placeholder="请输入真实姓名" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">手机号</label>
        <div class="layui-input-block">
            <input type="text" id="formPhone" lay-verify="required|phone" placeholder="请输入手机号" class="layui-input">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">用户角色</label>
        <div class="layui-input-block">
            <select id="formRole" lay-verify="required" class="layui-select">
                <option value="">请选择角色</option>
                <option value="admin">管理员</option>
                <option value="operator">操作员</option>
                <option value="driver">司机</option>
            </select>
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">账号状态</label>
        <div class="layui-input-block">
            <input type="radio" name="status" value="1" title="启用" checked lay-filter="statusRadio">
            <input type="radio" name="status" value="0" title="禁用" lay-filter="statusRadio">
        </div>
    </div>
    <div class="layui-form-item">
        <label class="layui-form-label">备注信息</label>
        <div class="layui-input-block">
            <textarea id="formRemark" placeholder="请输入备注" class="layui-textarea"></textarea>
        </div>
    </div>
</div>

<script src="/layui/layui.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script>
    layui.use(['table', 'form', 'layer', 'laydate'], function() {
        var table = layui.table;
        var form = layui.form;
        var layer = layui.layer;
        var laydate = layui.laydate;

        // 全局Token校验（单独打开页面时生效）
        $(function() {
            var token = localStorage.getItem('token');
            if (!token) {
                layer.msg('请先登录系统', {icon: 2});
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 1500);
                return;
            }

            // 设置全局AJAX请求头
            $.ajaxSetup({
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'  // 添加默认的Content-Type
                },
                error: function(xhr) {
                    if (xhr.status === 401) {
                        layer.msg('登录已过期，请重新登录', {icon: 2});
                        localStorage.removeItem('token');
                        setTimeout(() => {
                            window.location.href = '/login.html';
                        }, 1500);
                    } else if (xhr.status === 400) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            layer.msg(response.message || '请求参数错误', {icon: 2});
                        } catch (e) {
                            layer.msg('请求参数错误', {icon: 2});
                        }
                    }
                }
            });
        });

        // 表格渲染
        var userTable = table.render({
            elem: '#userTable',
            url: '/api/users', // 后端用户列表接口
            method: 'GET',
            page: true,
            limit: 10,
            limits: [10, 20, 30],
            request: {
                pageName: 'page',
                limitName: 'limit'
            },
            response: {
                statusCode: 0, // Layui表格成功的状态码是0
                statusName: 'code',
                msgName: 'msg',
                countName: 'count',
                dataName: 'data'
            },
            cols: [[
                {field: 'userId', title: 'ID', width: 80, align: 'center'},
                {field: 'username', title: '用户名', minWidth: 120},
                {field: 'realName', title: '真实姓名', width: 100, align: 'center'},
                {field: 'phone', title: '手机号', width: 120, align: 'center'},
                {field: 'role', title: '用户角色', width: 100, align: 'center', templet: function(d) {
                        var roleMap = {
                            'admin': '管理员',
                            'operator': '操作员',
                            'driver': '司机'
                        };
                        return roleMap[d.role] || '未知';
                    }},
                {field: 'status', title: '账号状态', width: 100, align: 'center', templet: function(d) {
                        // 注意：后端返回的status是String类型
                        return d.status === '1'
                            ? '<span class="status-tag status-enabled">启用</span>'
                            : '<span class="status-tag status-disabled">禁用</span>';
                    }},
                {field: 'createTime', title: '创建时间', width: 160, align: 'center'},
                {title: '操作', width: 180, align: 'center', templet: function(d) {
                        // 确保获取正确的userId
                        var userId = d.userId || d.id;
                        var currentStatus = d.status;
                        return `
                        <button class="layui-btn layui-btn-xs layui-btn-normal edit-btn" data-id="${userId}">编辑</button>
                        <button class="layui-btn layui-btn-xs ${currentStatus === '1' ? 'layui-btn-warning' : 'layui-btn-normal'} status-btn" data-id="${userId}" data-status="${currentStatus}">
                            ${currentStatus === '1' ? '禁用' : '启用'}
                        </button>
                        <button class="layui-btn layui-btn-xs layui-btn-danger delete-btn" data-id="${userId}">删除</button>
                    `;
                    }}
            ]],
            done: function(res) {
                if (res.code === 401) {
                    layer.msg('登录已过期，请重新登录', {icon: 2});
                    setTimeout(() => window.location.href = '/login.html', 1500);
                }
            }
        });

        // 搜索按钮
        $('#searchBtn').click(function() {
            userTable.reload({
                where: {
                    username: $('#username').val(),
                    role: $('#role').val(),
                    status: $('#userStatus').val()
                },
                page: {curr: 1}
            });
        });

        // 重置按钮
        $('#resetBtn').click(function() {
            $('#username').val('');
            $('#role').val('');
            $('#userStatus').val('');
            userTable.reload({where: {}, page: {curr: 1}});
        });

        // 新增用户
        $('#addUserBtn').click(function() {
            // 重置表单
            $('#userId').val('');
            $('#formUsername').val('');
            $('#formPassword').val('');
            $('#formRealName').val('');
            $('#formPhone').val('');
            $('#formRole').val('');
            $('input[name="status"][value="1"]').prop('checked', true);
            $('#formRemark').val('');
            form.render('radio');

            layer.open({
                type: 1,
                title: '新增用户',
                area: ['500px', '500px'],
                content: $('#userForm'),
                btn: ['确认提交', '取消'],
                btn1: function(index) {
                    // 表单校验
                    var username = $('#formUsername').val().trim();
                    var password = $('#formPassword').val().trim();
                    var realName = $('#formRealName').val().trim();
                    var phone = $('#formPhone').val().trim();
                    var role = $('#formRole').val();

                    if (!username) {
                        layer.msg('请输入用户名', {icon: 2});
                        return;
                    }
                    if (!password) {
                        layer.msg('请输入密码', {icon: 2});
                        return;
                    }
                    if (!realName) {
                        layer.msg('请输入真实姓名', {icon: 2});
                        return;
                    }
                    if (!phone) {
                        layer.msg('请输入手机号', {icon: 2});
                        return;
                    }
                    if (!role) {
                        layer.msg('请选择用户角色', {icon: 2});
                        return;
                    }

                    var status = $('input[name="status"]:checked').val();
                    var data = {
                        username: username,
                        password: password,
                        realName: realName,
                        phone: phone,
                        role: role,
                        status: status,
                        remark: $('#formRemark').val()
                    };

                    $.ajax({
                        url: '/api/users',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(data),
                        success: function(res) {
                            if (res.code === 200) {
                                layer.msg('新增成功', {icon: 1});
                                userTable.reload();
                                layer.close(index);
                            } else {
                                layer.msg(res.msg || '新增失败', {icon: 2});
                            }
                        },
                        error: function(xhr, status, error) {
                            var errorMsg = '请求失败';
                            try {
                                var response = JSON.parse(xhr.responseText);
                                errorMsg = response.message || errorMsg;
                            } catch (e) {
                                errorMsg = xhr.statusText || errorMsg;
                            }
                            layer.msg(errorMsg, {icon: 2});
                        }
                    });
                }
            });
        });

        // 编辑用户 - 使用事件委托确保点击事件绑定
        $(document).on('click', '.edit-btn', function() {
            var id = $(this).data('id');
            if (!id || id === 'undefined') {
                layer.msg('获取用户ID失败', {icon: 2});
                return;
            }

            // 显示加载中
            var loadIndex = layer.load(1);

            $.ajax({
                url: '/api/users/' + id,
                type: 'GET',
                success: function(res) {
                    layer.close(loadIndex);
                    if (res.code === 200) {
                        var data = res.data;
                        // 填充表单
                        $('#userId').val(data.userId || data.id);
                        $('#formUsername').val(data.username);
                        $('#formPassword').val(''); // 编辑时密码留空
                        $('#formRealName').val(data.realName);
                        $('#formPhone').val(data.phone);
                        $('#formRole').val(data.role);
                        $('input[name="status"][value="' + (data.status || '1') + '"]').prop('checked', true);
                        $('#formRemark').val(data.remark || '');
                        form.render('radio');

                        layer.open({
                            type: 1,
                            title: '编辑用户',
                            area: ['500px', '500px'],
                            content: $('#userForm'),
                            btn: ['确认修改', '取消'],
                            btn1: function(editIndex) {
                                // 表单校验
                                var username = $('#formUsername').val().trim();
                                var realName = $('#formRealName').val().trim();
                                var phone = $('#formPhone').val().trim();
                                var role = $('#formRole').val();

                                if (!username) {
                                    layer.msg('请输入用户名', {icon: 2});
                                    return;
                                }
                                if (!realName) {
                                    layer.msg('请输入真实姓名', {icon: 2});
                                    return;
                                }
                                if (!phone) {
                                    layer.msg('请输入手机号', {icon: 2});
                                    return;
                                }
                                if (!role) {
                                    layer.msg('请选择用户角色', {icon: 2});
                                    return;
                                }

                                var status = $('input[name="status"]:checked').val();
                                var updateData = {
                                    userId: $('#userId').val(),
                                    username: username,
                                    realName: realName,
                                    phone: phone,
                                    role: role,
                                    status: status,
                                    remark: $('#formRemark').val()
                                };

                                // 如果密码不为空，才传递密码字段
                                var password = $('#formPassword').val().trim();
                                if (password) {
                                    updateData.password = password;
                                }

                                $.ajax({
                                    url: '/api/users/' + id,
                                    type: 'PUT',
                                    contentType: 'application/json',
                                    data: JSON.stringify(updateData),
                                    success: function(res) {
                                        if (res.code === 200) {
                                            layer.msg('修改成功', {icon: 1});
                                            userTable.reload();
                                            layer.close(editIndex);
                                        } else {
                                            layer.msg(res.msg || '修改失败', {icon: 2});
                                        }
                                    },
                                    error: function(xhr, status, error) {
                                        var errorMsg = '请求失败';
                                        try {
                                            var response = JSON.parse(xhr.responseText);
                                            errorMsg = response.message || errorMsg;
                                        } catch (e) {
                                            errorMsg = xhr.statusText || errorMsg;
                                        }
                                        layer.msg(errorMsg, {icon: 2});
                                    }
                                });
                            }
                        });
                    } else {
                        layer.msg(res.msg || '获取用户详情失败', {icon: 2});
                    }
                },
                error: function(xhr, status, error) {
                    layer.close(loadIndex);
                    var errorMsg = '请求失败';
                    try {
                        var response = JSON.parse(xhr.responseText);
                        errorMsg = response.message || errorMsg;
                    } catch (e) {
                        errorMsg = xhr.statusText || errorMsg;
                    }
                    layer.msg(errorMsg, {icon: 2});
                }
            });
        });

        // 切换账号状态（启用/禁用）
        $(document).on('click', '.status-btn', function() {
            var id = $(this).data('id');
            var currentStatus = $(this).data('status');

            if (!id || id === 'undefined') {
                layer.msg('获取用户ID失败', {icon: 2});
                return;
            }

            var newStatus = currentStatus === '1' ? 0 : 1;
            var tipText = newStatus === 1 ? '启用' : '禁用';

            layer.confirm(`确定要${tipText}该用户吗？`, {icon: 3}, function(index) {
                $.ajax({
                    url: '/api/users/' + id + '/status',
                    type: 'PUT',
                    contentType: 'application/json',
                    data: JSON.stringify({status: newStatus}),
                    success: function(res) {
                        if (res.code === 200) {
                            layer.msg(`${tipText}成功`, {icon: 1});
                            userTable.reload();
                        } else {
                            layer.msg(res.msg || `${tipText}失败`, {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        var errorMsg = '请求失败';
                        try {
                            var response = JSON.parse(xhr.responseText);
                            errorMsg = response.message || errorMsg;
                        } catch (e) {
                            errorMsg = xhr.statusText || errorMsg;
                        }
                        layer.msg(errorMsg, {icon: 2});
                    }
                });
                layer.close(index);
            });
        });

        // 删除用户
        $(document).on('click', '.delete-btn', function() {
            var id = $(this).data('id');

            if (!id || id === 'undefined') {
                layer.msg('获取用户ID失败', {icon: 2});
                return;
            }

            layer.confirm('确定要删除该用户吗？删除后不可恢复！', {icon: 3, title: '警告'}, function(index) {
                $.ajax({
                    url: '/api/users/' + id,
                    type: 'DELETE',
                    success: function(res) {
                        if (res.code === 200) {
                            layer.msg('删除成功', {icon: 1});
                            userTable.reload();
                        } else {
                            layer.msg(res.msg || '删除失败', {icon: 2});
                        }
                    },
                    error: function(xhr, status, error) {
                        var errorMsg = '请求失败';
                        try {
                            var response = JSON.parse(xhr.responseText);
                            errorMsg = response.message || errorMsg;
                        } catch (e) {
                            errorMsg = xhr.statusText || errorMsg;
                        }
                        layer.msg(errorMsg, {icon: 2});
                    }
                });
                layer.close(index);
            });
        });

        // 导出数据
        $('#exportUserBtn').click(function() {
            var params = {
                username: $('#username').val(),
                role: $('#role').val(),
                status: $('#userStatus').val()
            };
            var queryString = $.param(params);
            window.location.href = '/api/users/export?' + queryString;
        });

        // 父页面通信（iframe嵌入时打开新标签页）
        window.openParentTab = function(url, title) {
            if (window.parent) {
                window.parent.postMessage({
                    type: 'openTab',
                    url: url,
                    title: title
                }, '*');
            } else {
                window.location.href = url;
            }
        };
    });
</script>
</body>
</html>
